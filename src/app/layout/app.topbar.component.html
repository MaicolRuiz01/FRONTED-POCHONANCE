<div class="layout-topbar">
    <!-- Botón de menú -->
    <button #menubutton class="p-link layout-menu-button layout-topbar-button" (click)="layoutService.onMenuToggle()">
        <i class="pi pi-bars"></i>
    </button>

    <a class="layout-topbar-logo" routerLink="">
        <img src="assets/layout/images/logoPochonance.svg" alt="logo" style="width:36px;height:36px;">
        <span style="
          font-family: 'Montserrat', sans-serif;
          font-weight: 900;
          font-size: 1.25rem;
          letter-spacing: 3px;
          text-transform: uppercase;
          background: linear-gradient(135deg, #d97706 0%, #fbbf24 35%, #fde68a 60%, #f59e0b 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          filter: drop-shadow(0 1px 3px rgba(251, 191, 36, 0.45));
        ">POCHONANCE</span>
    </a>

    <button #topbarmenubutton class="p-link layout-topbar-menu-button layout-topbar-button" (click)="layoutService.showProfileSidebar()">
        <i class="pi pi-ellipsis-v"></i>
    </button>

    <div #topbarmenu class="layout-topbar-menu" [ngClass]="{'layout-topbar-menu-mobile-active': layoutService.state.profileSidebarVisible}">

        <!-- Jornada de trabajo (solo operarios) -->
        <div *ngIf="mostrarJornada" class="topbar-jornada">
            <span *ngIf="jornadaActiva && modoLabel" class="jornada-modo"
                  [class.modo-venta]="jornadaModo === 'VENTA_USDT'"
                  [class.modo-caja]="jornadaModo === 'CAJA'"
                  title="En qué estás trabajando">
                <i class="pi" [ngClass]="jornadaModo === 'VENTA_USDT' ? 'pi-dollar' : 'pi-calculator'"></i>
                {{ modoLabel }}
            </span>
            <span *ngIf="jornadaActiva" class="jornada-timer" title="Tiempo trabajando">
                <i class="pi pi-clock"></i> {{ transcurrido }}
            </span>
            <button
                class="jornada-btn"
                [class.activa]="jornadaActiva"
                [disabled]="jornadaCargando"
                (click)="toggleJornada()"
                [title]="jornadaActiva ? 'Terminar jornada' : 'Empezar a trabajar'">
                <i class="pi" [ngClass]="jornadaActiva ? 'pi-stop-circle' : 'pi-play-circle'"></i>
                <span>{{ jornadaActiva ? 'Terminé' : 'Empecé a trabajar' }}</span>
            </button>
        </div>

        <!-- Selector de modo al iniciar la jornada -->
        <div *ngIf="mostrarSelectorModo" class="modo-overlay" (click)="mostrarSelectorModo = false">
            <div class="modo-card" (click)="$event.stopPropagation()">
                <h3 class="modo-title">¿En qué vas a trabajar?</h3>
                <p class="modo-sub">Elige una opción para empezar tu jornada.</p>

                <button class="modo-opt modo-opt--venta"
                        [disabled]="jornadaCargando"
                        (click)="iniciarJornadaCon('VENTA_USDT')">
                    <i class="pi pi-dollar"></i>
                    <span class="modo-opt-title">Vender USDT</span>
                    <span class="modo-opt-desc">Se activan las ventas en curso. Si pasan 5 min sin órdenes, se avisa por Telegram.</span>
                </button>

                <button class="modo-opt modo-opt--caja"
                        [disabled]="jornadaCargando"
                        (click)="iniciarJornadaCon('CAJA')">
                    <i class="pi pi-calculator"></i>
                    <span class="modo-opt-title">Hacer caja</span>
                    <span class="modo-opt-desc">Sin alarma. Cada hora se informa cuánto llevas cuadrando caja.</span>
                </button>

                <button class="modo-cancel" (click)="mostrarSelectorModo = false">Cancelar</button>
            </div>
        </div>

        <!-- Usuario + rol -->
        <div class="topbar-user-info">
            <i class="pi pi-user" style="color: #f59e0b;"></i>
            <span class="topbar-username">{{ auth.getUsername() }}</span>
            <span class="topbar-rol" [class.admin]="auth.isAdmin()">
                {{ auth.getRol() }}
            </span>
        </div>

        <!-- Cerrar sesión -->
        <button class="p-link layout-topbar-button topbar-logout" (click)="logout()" title="Cerrar sesión">
            <i class="pi pi-sign-out"></i>
            <span>Salir</span>
        </button>

    </div>
</div>
