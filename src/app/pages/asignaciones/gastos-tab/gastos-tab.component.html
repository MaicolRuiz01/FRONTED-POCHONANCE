<div class="gastos-wrapper">

  <!-- Header -->
  <div class="gastos-header">
    <div class="gastos-header-title">
      <span class="gastos-header-icon"><i class="pi pi-wallet"></i></span>
      <div>
        <h2>Gastos</h2>
        <span class="gastos-subtitle">Registra y consulta los gastos de cuentas y cajas</span>
      </div>
    </div>
    <button pButton icon="pi pi-plus" label="Nuevo gasto"
      class="p-button-sm gastos-new-btn" (click)="openNew()"></button>
  </div>

  <!-- Tabla en tarjeta -->
  <div class="gastos-card">
    <app-mi-table [data]="gastosView" [columns]="columns">
      <ng-template #actionTemplate let-g>
        <button pButton icon="pi pi-trash" title="Eliminar gasto y devolver el saldo"
          class="p-button-rounded p-button-text p-button-danger p-button-sm"
          (click)="pedirEliminar(g)"></button>
      </ng-template>
    </app-mi-table>
  </div>

</div>

<!-- Modal: Nuevo gasto -->
<p-dialog [(visible)]="productDialog" header="Nuevo gasto" [modal]="true"
  [style]="{ width: '440px', maxWidth: '95vw' }" [draggable]="false" [resizable]="false"
  styleClass="gasto-dialog">

  <div class="gasto-form">

    <!-- Forma de pago (segmentado) -->
    <div class="gasto-field">
      <label>Forma de pago</label>
      <div class="gasto-segment">
        <button type="button" class="gasto-seg-btn" [class.active]="tipoPago === 'cuenta'"
          (click)="tipoPago = 'cuenta'">
          <i class="pi pi-building"></i> Cuenta COP
        </button>
        <button type="button" class="gasto-seg-btn" [class.active]="tipoPago === 'caja'"
          (click)="tipoPago = 'caja'">
          <i class="pi pi-money-bill"></i> Caja (efectivo)
        </button>
      </div>
    </div>

    <!-- Selección de cuenta COP -->
    <div *ngIf="tipoPago === 'cuenta'" class="gasto-field">
      <label>Cuenta COP</label>

      <!-- Filtro por tipo de banco -->
      <div class="gasto-banco-bar">
        <button type="button" *ngFor="let b of bancosDisponibles"
          class="gasto-banco-chip" [class.active]="bancoActivo(b.value)"
          (click)="toggleBanco(b.value)">
          {{ b.label }}
        </button>
      </div>

      <p-dropdown
        [options]="cuentasFiltradas"
        optionLabel="name"
        optionValue="id"
        [(ngModel)]="cuentaSeleccionadaId"
        [filter]="true"
        placeholder="Seleccione una cuenta"
        styleClass="w-full"
        [appendTo]="'body'">
        <ng-template let-cuenta pTemplate="item">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
            <span style="font-weight:500">{{ cuenta.name }}</span>
            <small style="color:#64748b;font-weight:600">{{ cuenta.balance | currency:'USD' }}</small>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <!-- Selección de caja -->
    <div *ngIf="tipoPago === 'caja'" class="gasto-field">
      <label>Caja</label>
      <p-dropdown
        [options]="cajas"
        optionLabel="name"
        optionValue="id"
        [(ngModel)]="cajaSeleccionadaId"
        [filter]="true"
        placeholder="Seleccione una caja"
        styleClass="w-full"
        [appendTo]="'body'">
        <ng-template let-caja pTemplate="item">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
            <span style="font-weight:500">{{ caja.name }}</span>
            <small style="color:#64748b;font-weight:600">{{ caja.saldo | currency:'USD' }}</small>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <!-- Descripción -->
    <div class="gasto-field">
      <label>Descripción</label>
      <input pInputText class="w-full" [(ngModel)]="nuevoGasto.descripcion"
        placeholder="¿En qué fue el gasto?" />
    </div>

    <!-- Monto -->
    <div class="gasto-field">
      <label>Monto</label>
      <input type="number" pInputText class="w-full" [(ngModel)]="nuevoGasto.monto"
        inputmode="numeric" placeholder="0" />
    </div>

  </div>

  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" class="p-button-text" (click)="productDialog = false"
      [disabled]="guardando"></button>
    <button pButton [label]="guardando ? 'Guardando…' : 'Guardar gasto'"
      [icon]="guardando ? 'pi pi-spin pi-spinner' : 'pi pi-check'" class="p-button-success"
      (click)="crearGasto()"
      [disabled]="guardando || !nuevoGasto.descripcion || !nuevoGasto.monto">
    </button>
  </ng-template>

</p-dialog>

<!-- Modal: confirmar eliminación (devuelve el saldo) -->
<p-dialog [(visible)]="confirmDialog" header="Eliminar gasto" [modal]="true"
  [style]="{ width: '380px', maxWidth: '95vw' }" [draggable]="false" [resizable]="false">
  <div style="padding:.25rem 0;">
    <p style="margin:0 0 .5rem 0;">
      ¿Eliminar este gasto y <strong>devolver el saldo</strong> a
      <strong>{{ gastoAEliminar?.origen }}</strong>?
    </p>
    <p style="margin:0;color:#64748b;">Monto: {{ gastoAEliminar?.monto | number:'1.0-2' }}</p>
  </div>
  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" class="p-button-text" (click)="confirmDialog = false"
      [disabled]="eliminando"></button>
    <button pButton [label]="eliminando ? 'Eliminando…' : 'Eliminar'"
      [icon]="eliminando ? 'pi pi-spin pi-spinner' : 'pi pi-trash'" class="p-button-danger"
      (click)="confirmarEliminar()" [disabled]="eliminando">
    </button>
  </ng-template>
</p-dialog>
