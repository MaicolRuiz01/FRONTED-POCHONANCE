<div class="tp-card">

  <div class="tp-header">
    <span class="tp-icon"><i class="pi pi-arrow-right-arrow-left"></i></span>
    <div>
      <h2 class="tp-title">Traspasos</h2>
      <span class="tp-sub">Transferencias de cripto entre cuentas · {{ total }} en total</span>
    </div>
  </div>

  <div class="tp-table-wrap">
    <p-table [value]="traspasos"
             [lazy]="true"
             (onLazyLoad)="load($event)"
             [paginator]="true"
             [rows]="rows"
             [totalRecords]="total"
             [loading]="loading"
             [rowsPerPageOptions]="[20, 50, 100]"
             dataKey="idtransaccion"
             styleClass="p-datatable-sm p-datatable-striped"
             responsiveLayout="scroll"
             [showCurrentPageReport]="true"
             currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} traspasos">

      <ng-template pTemplate="header">
        <tr>
          <th>Fecha</th>
          <th>De</th>
          <th>A quién</th>
          <th class="tp-right">Cantidad</th>
          <th>Moneda</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-t>
        <tr>
          <td>{{ t.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
          <td><span [ngClass]="t.origen ? 'tp-acc' : 'tp-ext'">{{ t.origen || 'Externa' }}</span></td>
          <td><span [ngClass]="t.destino ? 'tp-acc' : 'tp-ext'">{{ t.destino || 'Externa' }}</span></td>
          <td class="tp-right tp-amount">{{ t.cantidad | number:'1.0-3' }}</td>
          <td><span class="tp-coin">{{ t.moneda || 'USDT' }}</span></td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="tp-empty">No hay traspasos.</td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
