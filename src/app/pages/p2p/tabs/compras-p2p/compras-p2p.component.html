<div class="card">
  <div class="flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <h3 class="m-0">Compras P2P de Hoy</h3>
    <p-dropdown
      [options]="binanceAccounts"
      [(ngModel)]="selectedBinanceAccount"
      optionLabel="name"
      placeholder="Todas las cuentas"
      [showClear]="true"
      (onChange)="onAccountFilter()">
    </p-dropdown>
  </div>

  <div *ngIf="loading" class="flex justify-content-center p-4">
    <div style="width:48px;height:48px;display:inline-block"><p-progressSpinner strokeWidth="4"></p-progressSpinner></div>
  </div>

  <p *ngIf="!loading && compras.length === 0" class="text-center text-color-secondary">
    No hay compras P2P para hoy.
  </p>

  <p-table *ngIf="!loading && compras.length > 0"
    [value]="compras"
    [paginator]="compras.length > 10"
    [rows]="10"
    responsiveLayout="stack"
    styleClass="p-datatable-sm p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th>Hora</th>
        <th>Cuenta Binance</th>
        <th class="text-right">USD</th>
        <th class="text-right">COP</th>
        <th class="text-right">Tasa</th>
        <th class="text-right">Comisión</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-c>
      <tr>
        <td>{{ c.dateFmt }}</td>
        <td>{{ c.nameAccountBinance }}</td>
        <td class="text-right">{{ c.dollarsUsFmt }}</td>
        <td class="text-right">{{ c.pesosCopFmt }}</td>
        <td class="text-right">{{ c.tasaFmt }}</td>
        <td class="text-right">{{ c.commission | number:'1.2-2' }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
