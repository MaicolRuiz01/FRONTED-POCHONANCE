<p-tabView [(activeIndex)]="selectedIndex">
  <p-tabPanel>
    <ng-template pTemplate="header">
      <span (click)="onCuentasHeaderClick()">CUENTAS</span>
    </ng-template>
    <app-saldos #saldosComp></app-saldos>
  </p-tabPanel>

  <p-tabPanel header="CAJAS">
    <app-cajas-tab></app-cajas-tab>
  </p-tabPanel>

  <p-tabPanel>
    <ng-template pTemplate="header">
      <span (click)="onClientesHeaderClick()">CLIENTES</span>
    </ng-template>
    <app-clientes-wrapper #clientesWrapperComp></app-clientes-wrapper>
  </p-tabPanel>

  <p-tabPanel header="BALANCE">
    <app-caja></app-caja>
  </p-tabPanel>
</p-tabView>
