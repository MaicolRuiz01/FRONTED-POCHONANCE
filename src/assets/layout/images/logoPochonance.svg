<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <circle cx="24" cy="25" r="21" fill="rgba(0,0,0,0.25)" />

  <!-- Background coin -->
  <circle cx="24" cy="24" r="22" fill="url(#bg)"/>

  <!-- Outer gold ring -->
  <circle cx="24" cy="24" r="21.5" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Inner subtle ring -->
  <circle cx="24" cy="24" r="18.5" fill="none" stroke="url(#ring)" stroke-width="0.5" opacity="0.35"/>

  <!-- Letter P -->
  <text
    x="24" y="33"
    text-anchor="middle"
    font-family="Arial Black, 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="27"
    fill="url(#gold)"
    letter-spacing="-1"
  >P</text>

  <!-- Small crypto dots (accent) -->
  <circle cx="11" cy="24" r="1.2" fill="url(#ring)" opacity="0.6"/>
  <circle cx="37" cy="24" r="1.2" fill="url(#ring)" opacity="0.6"/>
</svg>
